name: Update news data

# เวลา cron เป็น UTC (เวลาไทย = UTC+7)
# ⚠️ ตั้งไว้ที่ "นาทีที่ 17" โดยตั้งใจ ไม่ใช่นาทีที่ 0
#    เพราะ GitHub Actions มีคิวแน่นมากช่วงต้นชั่วโมง (คนทั้งโลกตั้ง cron นาที 0 พร้อมกัน)
#    รอบที่ตั้งนาที 0 จึงถูกหน่วงนาน หรือถูกข้ามทิ้งบ่อย — ขยับมานาที 17 ช่วยให้รอบทำงานสม่ำเสมอขึ้น
# ช่วงคนใช้งานบ่อย ไทย 08:17-22:17 -> อัปเดตทุก 1 ชม. (ตรงกับที่ hourlyScanJob เก็บข่าวใหม่รายชั่วโมง)
# ช่วงกลางคืน ไทย 01:17 และ 04:17 -> อัปเดตห่างขึ้นเพราะคนใช้น้อย
# กดรันเองได้ทันทีผ่านแท็บ Actions > Update news data > Run workflow
on:
  schedule:
    - cron: '17 1-15 * * *'    # UTC 01:17-15:17 = ไทย 08:17-22:17 ทุกชั่วโมง
    - cron: '17 18,21 * * *'   # UTC 18:17,21:17 = ไทย 01:17, 04:17
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch sheet data and build JSON
        run: npm run build
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "อัปเดตข้อมูลข่าวอัตโนมัติ [skip ci]"
          git push
