name: Update news data

# รันทุก 3 ชั่วโมง (เวลา UTC — เวลาไทยคือ UTC+7 ดังนั้นจะรันตรง 07:00/10:00/13:00/16:00/19:00/22:00/01:00/04:00 น. ไทย)
# กดรันเองได้ทันทีผ่านแท็บ Actions > Update news data > Run workflow
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch sheet data and build JSON
        run: npm run build
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "อัปเดตข้อมูลข่าวอัตโนมัติ [skip ci]"
          git push
