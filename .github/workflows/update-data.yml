name: Update news data

# เวลา cron เป็น UTC (เวลาไทย = UTC+7)
# ช่วงคนใช้งานบ่อย ไทย 08:00-22:00 -> อัปเดตทุก 1 ชม. (ตรงกับที่ hourlyScanJob เก็บข่าวใหม่รายชั่วโมง)
# ช่วงกลางคืน ไทย 01:00 และ 04:00 -> อัปเดตห่างขึ้นเพราะคนใช้น้อย
# กดรันเองได้ทันทีผ่านแท็บ Actions > Update news data > Run workflow
on:
  schedule:
    - cron: '0 1-15 * * *'    # UTC 01:00-15:00 = ไทย 08:00-22:00 ทุกชั่วโมง
    - cron: '0 18,21 * * *'   # UTC 18:00,21:00 = ไทย 01:00, 04:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch sheet data and build JSON
        run: npm run build
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "อัปเดตข้อมูลข่าวอัตโนมัติ [skip ci]"
          git push
