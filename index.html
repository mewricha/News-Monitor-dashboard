<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แดชบอร์ดข่าวกองทัพบก</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <h1>📊 แดชบอร์ดข่าวกองทัพบก</h1>
      <p id="lastUpdated" class="last-updated">กำลังโหลด...</p>
    </div>
  </header>

  <main class="container">

    <section id="statGrid" class="stat-grid"></section>

    <section class="filter-bar">
      <input type="text" id="searchInput" placeholder="ค้นหาหัวข้อ/เนื้อหา/แหล่งข่าว..." />

      <div class="filter-row">
        <select id="categoryFilter">
          <option value="">ทุกหมวด</option>
        </select>

        <select id="sortOrder">
          <option value="desc">ใหม่ล่าสุดก่อน</option>
          <option value="asc">เก่าสุดก่อน</option>
          <option value="count">นำเสนอมากสุดก่อน</option>
        </select>
      </div>

      <div class="filter-row">
        <label class="date-label">จาก <input type="date" id="dateFrom"></label>
        <label class="date-label">ถึง <input type="date" id="dateTo"></label>
      </div>

      <div class="filter-row">
        <label class="checkbox-label"><input type="checkbox" id="onlyNegative"> เฉพาะข่าวลบ</label>
        <label class="checkbox-label"><input type="checkbox" id="onlyCambodia"> เฉพาะไทย-กัมพูชา</label>
        <button id="exportBtn" class="export-btn">⬇ ส่งออก CSV</button>
      </div>
    </section>

    <p id="resultCount" class="result-count"></p>

    <section id="resultsGrid" class="results-grid">
      <div class="loading">กำลังโหลดข้อมูล...</div>
    </section>

  </main>

  <footer class="footer">
    <p>ข้อมูลอัปเดตอัตโนมัติทุก 3 ชั่วโมงจาก Google Sheet ผ่าน GitHub Actions</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
